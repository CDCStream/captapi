name: Instagram AI avatar agent

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the generated Reel immediately
        required: false
        type: boolean
        default: false
  schedule:
    # 15:00 UTC reaches US morning and European evening.
    - cron: "0 15 * * *"

concurrency:
  group: instagram-avatar-agent
  cancel-in-progress: false

jobs:
  create-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily avatar video
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
          HEYGEN_AVATAR_ID: ${{ secrets.HEYGEN_AVATAR_ID }}
          HEYGEN_VOICE_ID: ${{ secrets.HEYGEN_VOICE_ID }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_SCRIPT_MODEL: ${{ vars.INSTAGRAM_SCRIPT_MODEL }}
          INSTAGRAM_AUTO_PUBLISH: ${{ vars.INSTAGRAM_AUTO_PUBLISH }}
        run: >-
          python scripts/instagram_avatar_agent.py
          ${{ github.event.inputs.publish == 'true' && '--publish' || '' }}

      - name: Upload creative and video for review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-reel-${{ github.run_id }}
          path: marketing/instagram-runs/
          if-no-files-found: warn
          retention-days: 14
